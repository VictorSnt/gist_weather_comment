services:
  api:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    container_name: weather-comment-api
    working_dir: /app
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    volumes:
      - ./:/app
    ports:
      - "${HTTP_SERVER_PORT:-8000}:${HTTP_SERVER_PORT:-8000}"
    command: >
      sh -c "uv sync --frozen &&
      uv run uvicorn src.api.app:create_app --factory --host 0.0.0.0 --port ${HTTP_SERVER_PORT:-8000}"
